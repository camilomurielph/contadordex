<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ContadorDex TCG</title>
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e2024;
            --primary-blue: #1d70f5;
            --btn-red: #ff4d4d;
            --btn-green: #4dff4d;
            --text-color: #ffffff;
            
            --team-red: #e74c3c;
            --team-green: #2ecc71;
            
            /* Colores de Estados */
            --status-sin: #888888;
            --status-par: #f1c40f;
            --status-dor: #3498db;
            --status-que: #e74c3c;
            --status-env: #9b59b6;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        /* Ajuste de márgenes para centrar y alejar de los bordes del celular */
        #app-container {
            width: 100%;
            max-width: 400px;
            height: 100%;
            position: relative;
            display: flex;
            flex-direction: column;
            padding: 40px 20px 50px 20px; 
        }

        .view {
            display: none;
            flex-direction: column;
            align-items: center;
            height: 100%;
            width: 100%;
            animation: fadeIn 0.2s ease;
        }
        .view.active { display: flex; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Títulos Dinámicos */
        .header-container {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
            position: relative;
        }
        
        .btn-back-header {
            position: absolute;
            left: 0;
            background: transparent;
            color: var(--text-color);
            border: none;
            font-size: 1.2rem;
            cursor: pointer;
            padding: 5px;
        }

        h1 {
            font-size: 1.2rem;
            font-weight: 500;
            text-align: center;
        }

        /* Selectores de Equipo (Inicio) */
        .team-selector {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 100%;
            margin-top: 15px;
        }

        .team-card {
            background-color: var(--card-bg);
            border-radius: 20px;
            padding: 15px 20px;
            display: flex;
            align-items: center;
            gap: 20px;
            cursor: pointer;
            border: 2px solid transparent;
            transition: transform 0.1s ease;
        }
        .team-card:active { transform: scale(0.98); }
        
        .team-card.red { border-left: 5px solid var(--team-red); }
        .team-card.green { border-left: 5px solid var(--team-green); }

        .team-card img {
            width: 60px;
            height: 60px;
            image-rendering: pixelated;
        }

        .team-card h2 { font-size: 1.3rem; }

        /* SECCIÓN COMBATE */
        .combat-title {
            font-size: 1rem;
            margin-top: 25px;
            text-align: center;
            color: #aaa;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .combat-section {
            margin-top: 10px;
            background-color: var(--card-bg);
            border-radius: 20px;
            padding: 15px;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
        }

        .combat-side {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 40%;
            text-align: center;
        }

        .combat-vs { font-weight: 900; font-size: 1.2rem; color: #555; font-style: italic; }
        
        .combat-side img { width: 60px; height: 60px; object-fit: contain; filter: drop-shadow(0 4px 4px rgba(0,0,0,0.5)); }
        .combat-side .name { font-size: 0.8rem; margin-top: 5px; font-weight: bold; text-transform: capitalize; }
        .combat-side .ps { font-size: 0.75rem; font-weight: bold; margin-top: 2px; }
        .combat-side .empty-slot {
            width: 50px; height: 50px; border-radius: 50%; border: 2px dashed #555;
            display: flex; align-items: center; justify-content: center; color: #555; font-size: 0.8rem;
        }

        /* Botones de Acción Global */
        .btn-add {
            background-color: var(--primary-blue);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 20px;
            font-size: 1rem;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(29, 112, 245, 0.4);
            cursor: pointer;
            margin-bottom: 5px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Botón Grande Estado Vacío */
        .empty-state {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex-grow: 1;
            width: 100%;
            margin-bottom: 60px;
        }

        .btn-add-large {
            width: 150px;
            height: 150px;
            background-color: transparent;
            border: 2px dashed #555;
            border-radius: 20px;
            color: #888;
            font-size: 1rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-add-large:active {
            border-color: var(--primary-blue);
            color: white;
            background-color: rgba(29, 112, 245, 0.1);
        }

        .btn-add-large span {
            font-size: 3rem;
            font-weight: 300;
            margin-bottom: 10px;
            line-height: 1;
        }

        /* Intercambio Rápido */
        .quick-swap-btn {
            position: absolute;
            bottom: 40px;
            right: 20px;
            width: 60px;
            height: 60px;
            background-color: var(--card-bg);
            border: 2px solid #444;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            z-index: 5;
        }

        .quick-swap-btn svg { width: 35px; height: 35px; fill: white; transition: transform 0.3s ease; }
        .quick-swap-btn:active svg { transform: rotate(180deg); }

        /* Moneda Global */
        .btn-coin-float {
            position: absolute;
            top: 30px;
            right: 20px;
            width: 45px;
            height: 45px;
            background: linear-gradient(135deg, #f1c40f, #d4ac0d);
            border: 2px solid #b8960b;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.4);
            z-index: 10;
            font-size: 1.5rem;
            transition: transform 0.1s ease;
        }

        .btn-coin-float:active { transform: scale(0.9); }
        
        /* Modal Animación Moneda */
        #coin-overlay {
            display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); z-index: 100; justify-content: center; align-items: center; flex-direction: column;
        }

        .coin {
            width: 120px; height: 120px; background: linear-gradient(135deg, #f1c40f, #d4ac0d);
            border-radius: 50%; border: 6px solid #b8960b; display: flex; justify-content: center; align-items: center;
            font-size: 2rem; font-weight: bold; color: #fff; text-shadow: 1px 1px 3px rgba(0,0,0,0.4);
            box-shadow: 0 10px 25px rgba(0,0,0,0.6), inset 0 0 15px rgba(255,255,255,0.4);
        }

        @keyframes flipAnimation {
            0% { transform: rotateX(0deg) scale(1); }
            50% { transform: rotateX(1080deg) scale(1.4); } 
            100% { transform: rotateX(2160deg) scale(1); }  
        }

        .flip { animation: flipAnimation 1.5s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }

        #coin-result-text {
            margin-top: 30px; font-size: 2.5rem; font-weight: bold; color: white;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5); opacity: 0; transition: opacity 0.3s ease;
        }
        
        /* Grid de Criaturas */
        #pokemon-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 100%;
            overflow-y: auto; padding-bottom: 120px;
        }

        .pkmn-card {
            background-color: var(--card-bg); border-radius: 16px; padding: 15px; display: flex; flex-direction: column;
            align-items: center; cursor: pointer; position: relative; box-shadow: 0 4px 6px rgba(0,0,0,0.1); border: 2px solid transparent;
        }

        .pkmn-card img { width: 80px; height: 80px; object-fit: contain; }
        .pkmn-card span { margin-top: 10px; font-size: 0.9rem; text-transform: capitalize; }
        
        .active-icon {
            position: absolute; top: -8px; left: -8px; background: var(--primary-blue);
            color: white; border-radius: 50%; width: 24px; height: 24px; display: flex;
            justify-content: center; align-items: center; font-size: 0.7rem; font-weight: bold;
            box-shadow: 0 2px 5px rgba(0,0,0,0.5);
        }

        .card-status-badge {
            font-size: 0.65rem; padding: 2px 6px; border-radius: 8px; margin-top: 4px; text-transform: uppercase; font-weight: bold;
        }

        /* Vista de Detalles */
        .detail-card {
            background-color: var(--card-bg); border-radius: 20px; padding: 20px; width: 100%; display: flex; flex-direction: column;
            align-items: center; position: relative;
        }

        .ps-badge {
            position: absolute; top: 15px; right: 15px; padding: 5px 12px; border-radius: 12px;
            font-weight: bold; font-size: 0.9rem; border: 1px solid transparent; transition: all 0.3s ease;
        }

        .detail-card img { width: 140px; height: 140px; object-fit: contain; margin: 15px 0 5px 0; }
        .detail-card h2 { font-size: 1.4rem; text-transform: capitalize; margin-bottom: 15px; }

        .status-selector-wrapper {
            width: 85%; margin-bottom: 20px; display: flex; flex-direction: column; gap: 5px;
        }
        .status-selector-wrapper label { font-size: 0.8rem; color: #aaa; }
        .status-select {
            width: 100%; padding: 10px; border-radius: 10px; background: #2a2d32; color: white; border: 2px solid var(--status-sin);
            outline: none; font-weight: bold; cursor: pointer;
        }

        /* Controles PS Personalizados */
        .custom-ps-row {
            display: flex; gap: 15px; align-items: center; margin-top: 5px;
        }

        .custom-ps-input {
            width: 80px; padding: 12px; text-align: center; border-radius: 12px; border: none; background: #333; color: white;
            font-size: 1.2rem; font-weight: bold; outline: none;
        }

        .btn-circle {
            width: 50px; height: 50px; border-radius: 50%; border: none; font-size: 1.5rem; color: black; font-weight: bold;
            display: flex; justify-content: center; align-items: center; cursor: pointer;
        }
        .btn-minus { background-color: var(--btn-red); }
        .btn-plus { background-color: var(--btn-green); }

        .nav-buttons {
            display: flex; justify-content: space-between; width: 100%; margin-top: 20px; gap: 10px;
        }

        .btn-nav {
            flex: 1; background: transparent; color: #888; border: 1px solid #888; padding: 10px; border-radius: 10px;
            cursor: pointer; text-align: center; font-size: 0.9rem;
        }
        .btn-delete { color: var(--btn-red); border-color: var(--btn-red); }

        .evo-wrapper {
            width: 100%; margin-top: 12px; display: flex; flex-direction: column; align-items: center; gap: 8px;
        }
        .btn-evo-toggle {
            width: 100%; background: #2a2d32; color: #fff; border: 1px solid #444; padding: 12px; border-radius: 10px;
            cursor: pointer; font-size: 0.9rem; font-weight: bold; transition: background 0.2s;
        }
        .evo-dropdown-list {
            display: none; flex-direction: column; width: 100%; background: #25272c; border: 1px solid #444; border-radius: 10px;
            max-height: 120px; overflow-y: auto; z-index: 5;
        }
        .evo-dropdown-list.open { display: flex; }
        .evo-btn-option {
            background: transparent; border: none; color: white; padding: 10px; text-align: left; text-transform: capitalize;
            cursor: pointer; border-bottom: 1px solid #333;
        }

        /* Texto de Créditos */
        .app-credits { font-size: 0.75rem; color: #666; margin-top: 5px; text-align: center; }
        
        .footer-container {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); display: flex; flex-direction: column; align-items: center;
        }

        /* Modal Añadir Pkmn y Autocompletado */
        #modal {
            display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8);
            justify-content: center; align-items: center; z-index: 10;
        }
        .modal-content {
            background-color: var(--card-bg); padding: 20px; border-radius: 16px; width: 85%; text-align: center;
        }
        
        .input-wrapper { position: relative; width: 100%; margin: 15px 0 10px 0; }
        
        .modal-content input {
            width: 100%; padding: 12px; border-radius: 8px; border: none; background: #333; color: white; outline: none; text-align: center;
        }

        .autocomplete-list {
            position: absolute; top: 100%; left: 0; width: 100%; background: #2a2d32; border-radius: 0 0 8px 8px; max-height: 150px;
            overflow-y: auto; z-index: 20; box-shadow: 0 4px 10px rgba(0,0,0,0.5); text-align: left;
        }
        .autocomplete-item {
            padding: 12px 15px; border-bottom: 1px solid #444; color: white; cursor: pointer; text-transform: capitalize; font-size: 0.95rem;
        }
        .autocomplete-item:hover { background-color: #3a3f45; }

        .modal-buttons { display: flex; justify-content: space-between; gap: 10px; margin-top: 15px;}
        .modal-buttons button { flex: 1; padding: 10px; border-radius: 8px; border: none; cursor: pointer; }
        .btn-confirm { background-color: var(--primary-blue); color: white; font-weight: bold; }
    </style>
</head>
<body>

<div id="app-container">

    <button class="btn-coin-float" onclick="throwCoin()">🪙</button>

    <div id="coin-overlay" onclick="closeCoin()">
        <div id="coin-anim" class="coin">?</div>
        <div id="coin-result-text"></div>
        <div id="coin-close-hint" style="margin-top: 25px; font-size: 0.9rem; color: #aaa; opacity: 0; transition: opacity 0.3s;">Toca para cerrar</div>
    </div>
    
    <div id="view-inicio" class="view active">
        <h1>Selecciona un Equipo</h1>
        
        <div class="team-selector">
            <div class="team-card red" onclick="selectTeam('red')">
                <img src="https://play.pokemonshowdown.com/sprites/trainers/red-gen3.png" alt="Red">
                <div>
                    <h2>Equipo Red</h2>
                    <span id="count-red" style="color:#aaa; font-size:0.9rem;">0 Pokémon</span>
                </div>
            </div>

            <div class="team-card green" onclick="selectTeam('green')">
                <img src="https://play.pokemonshowdown.com/sprites/trainers/blue-gen3.png" alt="Green">
                <div>
                    <h2>Equipo Green</h2>
                    <span id="count-green" style="color:#aaa; font-size:0.9rem;">0 Pokémon</span>
                </div>
            </div>
        </div>

        <h2 class="combat-title">Combate</h2>
        <div class="combat-section">
            <div class="combat-side" id="combat-red">
                </div>
            <div class="combat-vs">VS</div>
            <div class="combat-side" id="combat-green">
                </div>
        </div>
        
        <div style="margin-top: auto; padding-bottom: 5px;">
            <div class="app-credits">App por camilomuriel</div>
        </div>
    </div>

    <div id="view-criaturas" class="view">
        <div class="header-container">
            <button class="btn-back-header" onclick="goHome()">◀</button>
            <h1 id="team-title" style="margin:0;">Equipo</h1>
        </div>
        
        <div id="empty-state" class="empty-state">
            <button class="btn-add-large" onclick="openModal()">
                <span>+</span>
                Añadir Pkmn
            </button>
        </div>

        <div id="pokemon-grid"></div>
        
        <div class="footer-container">
            <button id="btn-add-small" class="btn-add" onclick="openModal()">+ Añadir Pkmn</button>
            <div class="app-credits">App por camilomuriel</div>
        </div>

        <button class="quick-swap-btn" onclick="swapTeam()">
            <svg viewBox="0 0 24 24">
                <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8 0-.41.04-.82.11-1.22l3.41 3.41c.45.45 1.15.13 1.15-.5V9h4.67v2H10.1l-1.92-1.92c1.07-2.4 3.4-4.08 6.13-4.08 3.31 0 6 2.69 6 6s-2.69 6-6 6z"/>
                <circle cx="12" cy="12" r="2.5" fill="#121212"/>
                <circle cx="12" cy="12" r="1.2" fill="white"/>
            </svg>
        </button>
    </div>

    <div id="view-detalles" class="view">
        <div class="header-container">
            <button class="btn-back-header" onclick="goBackToRoster()">◀</button>
            <h1 style="margin:0;">Detalles</h1>
        </div>

        <div class="detail-card">
            <div class="ps-badge" id="detail-ps">80 PS ❤</div>
            <img id="detail-img" src="" alt="Pokemon">
            <h2 id="detail-name">Nombre</h2>
            
            <div class="status-selector-wrapper">
                <label for="status-select">Condición de Estado</label>
                <select id="status-select" class="status-select" onchange="handleStatusChange(this.value)">
                    <option value="sin estado">Sin Estado</option>
                    <option value="paralizado">Paralizado ⚡</option>
                    <option value="dormido">Dormido 💤</option>
                    <option value="quemado">Quemado 🔥</option>
                    <option value="envenenado">Envenenado ☠</option>
                </select>
            </div>

            <label style="font-size: 0.8rem; color: #aaa; margin-top: 5px;">Modificar PS</label>
            <div class="custom-ps-row">
                <button class="btn-circle btn-minus" onclick="applyCustomPS(-1)">-</button>
                <input type="number" id="custom-ps-val" class="custom-ps-input" placeholder="Cant." value="10" inputmode="numeric">
                <button class="btn-circle btn-plus" onclick="applyCustomPS(1)">+</button>
            </div>
        </div>
        
        <div class="evo-wrapper">
            <button class="btn-evo-toggle" id="btn-active" onclick="toggleActive()">Establecer como Activo ⚔️</button>
            
            <button class="btn-evo-toggle" id="btn-evo" onclick="toggleEvoMenu()">Evolucionar 👇</button>
            <div id="evo-menu" class="evo-dropdown-list"></div>
        </div>

        <div class="nav-buttons">
            <button class="btn-nav btn-delete" onclick="deletePokemon()">Eliminar / Debilitar</button>
        </div>
    </div>

    <div id="modal">
        <div class="modal-content">
            <h3 id="modal-title">Añadir a Equipo</h3>
            
            <div class="input-wrapper">
                <input type="text" id="pkmn-input" placeholder="Nombre (Ej: Pikachu)" autocomplete="off" oninput="handleSearchInput(event)">
                <div id="autocomplete-container" class="autocomplete-list"></div>
            </div>
            
            <input type="number" id="pkmn-ps-input" placeholder="PS Iniciales (Ej: 60, 120...)" autocomplete="off" inputmode="numeric">

            <div class="modal-buttons">
                <button class="btn-nav" onclick="closeModal()">Cancelar</button>
                <button class="btn-confirm" onclick="fetchPokemon()">Añadir</button>
            </div>
        </div>
    </div>

</div>

<script>
    let gameState = {
        red: [],
        green: []
    };
    
    let activeTeam = null; 
    let currentFocusIndex = null;
    let isFlipping = false; 

    // === SISTEMA DE AUTOCOMPLETADO ===
    let allPokemonNames = [];

    async function loadAllPokemonNames() {
        try {
            const res = await fetch('https://pokeapi.co/api/v2/pokemon?limit=10000');
            const data = await res.json();
            allPokemonNames = data.results.map(p => p.name);
        } catch (e) {
            console.log("No se pudo cargar la lista completa para autocompletado");
        }
    }
    
    loadAllPokemonNames();

    function handleSearchInput(e) {
        const val = e.target.value.toLowerCase().trim();
        const container = document.getElementById('autocomplete-container');
        container.innerHTML = ''; 
        
        if (!val) return;

        const matches = allPokemonNames.filter(name => name.startsWith(val) || name.includes(val)).slice(0, 6);

        matches.forEach(name => {
            const div = document.createElement('div');
            div.className = 'autocomplete-item';
            div.innerText = name;
            
            div.onclick = () => {
                document.getElementById('pkmn-input').value = name;
                container.innerHTML = ''; 
                // Ya no hace fetch automático para dar oportunidad de poner el PS
            };
            
            container.appendChild(div);
        });
    }

    const statusConfig = {
        'sin estado': { color: '#888888', bg: 'transparent' },
        'paralizado': { color: '#f1c40f', bg: 'rgba(241, 196, 15, 0.15)' },
        'dormido': { color: '#3498db', bg: 'rgba(52, 152, 219, 0.15)' },
        'quemado': { color: '#e74c3c', bg: 'rgba(231, 76, 60, 0.15)' },
        'envenenado': { color: '#9b59b6', bg: 'rgba(155, 89, 182, 0.15)' }
    };

    const viewInicio = document.getElementById('view-inicio');
    const viewCriaturas = document.getElementById('view-criaturas');
    const viewDetalles = document.getElementById('view-detalles');
    const grid = document.getElementById('pokemon-grid');
    const emptyState = document.getElementById('empty-state');
    const btnAddSmall = document.getElementById('btn-add-small');
    const modal = document.getElementById('modal');
    const inputField = document.getElementById('pkmn-input');
    const psInputField = document.getElementById('pkmn-ps-input');
    const evoMenu = document.getElementById('evo-menu');

    // === LÓGICA DE LA MONEDA ===
    function throwCoin() {
        if(isFlipping) return;
        isFlipping = true;

        const overlay = document.getElementById('coin-overlay');
        const coin = document.getElementById('coin-anim');
        const resultText = document.getElementById('coin-result-text');
        const closeHint = document.getElementById('coin-close-hint');
        
        overlay.style.display = 'flex';
        resultText.style.opacity = '0';
        closeHint.style.opacity = '0';
        coin.innerText = '?';
        
        coin.classList.remove('flip');
        void coin.offsetWidth; 
        coin.classList.add('flip');
        
        const isCara = Math.random() < 0.5;
        const resultStr = isCara ? 'CARA' : 'CRUZ';
        
        setTimeout(() => {
            coin.innerText = resultStr;
            resultText.innerText = `¡Es ${resultStr}!`;
            resultText.style.opacity = '1';
            closeHint.style.opacity = '1';
            isFlipping = false;
        }, 1500); 
    }

    function closeCoin() {
        if(!isFlipping) {
            document.getElementById('coin-overlay').style.display = 'none';
        }
    }

    // === NAVEGACIÓN Y VISTAS ===
    function selectTeam(team) {
        activeTeam = team;
        currentFocusIndex = null;
        updateViews();
    }

    function goHome() {
        activeTeam = null;
        currentFocusIndex = null;
        updateViews();
    }

    function goBackToRoster() {
        currentFocusIndex = null;
        updateViews();
    }

    function swapTeam() {
        activeTeam = activeTeam === 'red' ? 'green' : 'red';
        currentFocusIndex = null;
        updateViews();
    }

    function updateViews() {
        viewInicio.classList.remove('active');
        viewCriaturas.classList.remove('active');
        viewDetalles.classList.remove('active');
        evoMenu.classList.remove('open');

        // Actualizar datos del inicio
        document.getElementById('count-red').innerText = `${gameState.red.length} Pokémon`;
        document.getElementById('count-green').innerText = `${gameState.green.length} Pokémon`;
        renderCombatSection(); // Rellenar tablero de combate

        if (activeTeam === null) {
            viewInicio.classList.add('active');
        } else if (currentFocusIndex !== null) {
            viewDetalles.classList.add('active');
            renderDetails();
        } else {
            viewCriaturas.classList.add('active');
            
            const titleEl = document.getElementById('team-title');
            titleEl.innerText = activeTeam === 'red' ? 'Equipo Red' : 'Equipo Green';
            titleEl.style.color = activeTeam === 'red' ? 'var(--team-red)' : 'var(--team-green)';
            
            renderGrid();
        }
    }

    // === RENDERIZAR COMBATE EN INICIO ===
    function renderCombatSection() {
        const redActive = gameState.red.find(p => p.isActive);
        const greenActive = gameState.green.find(p => p.isActive);

        const buildActiveHtml = (pkmn) => {
            if (!pkmn) return `<div class="empty-slot">?</div><span class="name" style="color:#555;">Sin Activo</span>`;
            const psColor = pkmn.ps <= 30 ? 'var(--btn-red)' : 'var(--btn-green)';
            const statusHtml = pkmn.status !== 'sin estado' 
                ? `<span style="font-size:0.6rem; margin-top:2px; color:${statusConfig[pkmn.status].color}">${pkmn.status.toUpperCase()}</span>` 
                : '';
            return `
                <img src="${pkmn.image}" alt="${pkmn.name}">
                <span class="name">${pkmn.name}</span>
                <span class="ps" style="color: ${psColor}">${pkmn.ps} PS</span>
                ${statusHtml}
            `;
        };

        document.getElementById('combat-red').innerHTML = buildActiveHtml(redActive);
        document.getElementById('combat-green').innerHTML = buildActiveHtml(greenActive);
    }

    function openModal() {
        modal.style.display = 'flex';
        document.getElementById('modal-title').innerText = `Añadir a Equipo ${activeTeam === 'red' ? 'Red' : 'Green'}`;
        inputField.value = '';
        psInputField.value = '';
        document.getElementById('autocomplete-container').innerHTML = '';
        inputField.focus();
    }

    function closeModal() { 
        modal.style.display = 'none'; 
        document.getElementById('autocomplete-container').innerHTML = '';
    }

    function parseEvolutionChain(chainObj, resultList = []) {
        if (!chainObj) return resultList;
        resultList.push(chainObj.species.name);
        if (chainObj.evolves_to && chainObj.evolves_to.length > 0) {
            chainObj.evolves_to.forEach(nextForm => parseEvolutionChain(nextForm, resultList));
        }
        return resultList;
    }

    async function fetchPokemon() {
        const query = inputField.value.trim().toLowerCase();
        const startPS = parseInt(psInputField.value);

        if (!query) { alert('Ingresa un nombre'); return; }
        if (isNaN(startPS) || startPS < 0) { alert('Debes ingresar los PS iniciales'); return; }
        
        closeModal();
        
        try {
            const res = await fetch(`https://pokeapi.co/api/v2/pokemon/${query}`);
            if (!res.ok) throw new Error();
            const data = await res.json();
            const imageUrl = data.sprites.other['official-artwork'].front_default || data.sprites.front_default;

            let evolutions = [];
            try {
                const speciesRes = await fetch(data.species.url);
                if (speciesRes.ok) {
                    const speciesData = await speciesRes.json();
                    const chainRes = await fetch(speciesData.evolution_chain.url);
                    if (chainRes.ok) {
                        const chainData = await chainRes.json();
                        evolutions = parseEvolutionChain(chainData.chain);
                    }
                }
            } catch (e) { console.error("Sin datos de evolución", e); }

            // Si es el primer pokemon del equipo, lo marcamos activo de una vez
            const isFirst = gameState[activeTeam].length === 0;

            gameState[activeTeam].push({
                name: data.name,
                image: imageUrl,
                ps: startPS,
                status: 'sin estado',
                isActive: isFirst,
                evolutions: evolutions
            });

            updateViews();
        } catch (error) {
            alert('Pokémon no encontrado. Verifica el nombre.');
        }
    }

    function renderGrid() {
        const roster = gameState[activeTeam];
        
        if (roster.length === 0) {
            emptyState.style.display = 'flex';
            grid.style.display = 'none';
            btnAddSmall.style.display = 'none';
        } else {
            emptyState.style.display = 'none';
            grid.style.display = 'grid';
            btnAddSmall.style.display = 'flex';
        }

        grid.innerHTML = '';
        roster.forEach((pkmn, index) => {
            const card = document.createElement('div');
            card.className = 'pkmn-card';
            
            const currentConfig = statusConfig[pkmn.status];
            if (pkmn.status !== 'sin estado') card.style.borderColor = currentConfig.color;

            card.onclick = () => {
                currentFocusIndex = index;
                updateViews();
            };

            let statusBadgeHtml = '';
            if (pkmn.status !== 'sin estado') {
                statusBadgeHtml = `<div class="card-status-badge" style="color: ${currentConfig.color}; background: ${currentConfig.bg};">${pkmn.status}</div>`;
            }

            const activeIconHtml = pkmn.isActive ? `<div class="active-icon">⚔️</div>` : '';
            const psColor = pkmn.ps <= 30 ? 'var(--btn-red)' : 'var(--btn-green)';

            card.innerHTML = `
                ${activeIconHtml}
                <img src="${pkmn.image}" alt="${pkmn.name}">
                <span style="font-weight: 500;">${pkmn.name}</span>
                ${statusBadgeHtml}
                <div style="position: absolute; top: 10px; right: 12px; font-size: 0.75rem; color: ${psColor}; font-weight: bold;">
                    ${pkmn.ps} PS
                </div>
            `;
            grid.appendChild(card);
        });
    }

    function renderDetails() {
        const pkmn = gameState[activeTeam][currentFocusIndex];
        const select = document.getElementById('status-select');
        const psBadge = document.getElementById('detail-ps');
        const btnActive = document.getElementById('btn-active');
        
        document.getElementById('detail-name').innerText = pkmn.name;
        document.getElementById('detail-img').src = pkmn.image;
        
        psBadge.innerText = `${pkmn.ps} PS ❤`;
        if (pkmn.ps <= 30) {
            psBadge.style.color = 'var(--btn-red)';
            psBadge.style.borderColor = 'var(--btn-red)';
            psBadge.style.backgroundColor = 'rgba(255, 77, 77, 0.15)';
        } else {
            psBadge.style.color = 'var(--btn-green)';
            psBadge.style.borderColor = 'var(--btn-green)';
            psBadge.style.backgroundColor = 'rgba(77, 255, 77, 0.15)';
        }
        
        select.value = pkmn.status;
        select.style.borderColor = statusConfig[pkmn.status].color;

        // Botón Activo Estilos
        if (pkmn.isActive) {
            btnActive.innerText = "Quitar de Activo 🔄";
            btnActive.style.backgroundColor = "#555";
            btnActive.style.borderColor = "#555";
        } else {
            btnActive.innerText = "Establecer como Activo ⚔️";
            btnActive.style.backgroundColor = "var(--primary-blue)";
            btnActive.style.borderColor = "var(--primary-blue)";
        }

        evoMenu.innerHTML = '';
        const filteredEvos = pkmn.evolutions.filter(name => name !== pkmn.name);

        if (filteredEvos.length === 0) {
            document.getElementById('btn-evo').innerText = "Sin líneas evolutivas ✖";
            document.getElementById('btn-evo').disabled = true;
        } else {
            document.getElementById('btn-evo').innerText = "Evolucionar 👇";
            document.getElementById('btn-evo').disabled = false;
            
            filteredEvos.forEach(evoName => {
                const btnOption = document.createElement('button');
                btnOption.className = 'evo-btn-option';
                btnOption.innerText = evoName;
                btnOption.onclick = () => transformPokemon(evoName);
                evoMenu.appendChild(btnOption);
            });
        }
    }

    // === ACCIONES EN DETALLE ===
    function toggleActive() {
        const pkmn = gameState[activeTeam][currentFocusIndex];
        if (pkmn.isActive) {
            pkmn.isActive = false; // Lo apaga
        } else {
            // Apaga al resto del equipo y enciende este
            gameState[activeTeam].forEach(p => p.isActive = false);
            pkmn.isActive = true;
        }
        renderDetails();
    }

    function handleStatusChange(newStatus) {
        if (currentFocusIndex !== null) {
            gameState[activeTeam][currentFocusIndex].status = newStatus;
            document.getElementById('status-select').style.borderColor = statusConfig[newStatus].color;
        }
    }

    function applyCustomPS(multiplier) {
        const inputVal = parseInt(document.getElementById('custom-ps-val').value);
        if (isNaN(inputVal) || inputVal <= 0) return;
        
        if (currentFocusIndex !== null) {
            gameState[activeTeam][currentFocusIndex].ps = Math.max(0, gameState[activeTeam][currentFocusIndex].ps + (inputVal * multiplier));
            renderDetails();
        }
    }

    function toggleEvoMenu() { evoMenu.classList.toggle('open'); }

    async function transformPokemon(targetName) {
        evoMenu.classList.remove('open');
        try {
            const res = await fetch(`https://pokeapi.co/api/v2/pokemon/${targetName}`);
            if (!res.ok) throw new Error();
            const data = await res.json();
            
            gameState[activeTeam][currentFocusIndex].name = data.name;
            gameState[activeTeam][currentFocusIndex].image = data.sprites.other['official-artwork'].front_default || data.sprites.front_default;
            
            renderDetails();
        } catch (e) {
            alert('Error al evolucionar.');
        }
    }

    function deletePokemon() {
        if (confirm('¿Debilitar o remover este Pokémon?')) {
            const pkmn = gameState[activeTeam][currentFocusIndex];
            const wasActive = pkmn.isActive;
            
            gameState[activeTeam].splice(currentFocusIndex, 1);
            
            // Si el pokemon debilitado era el activo, avisa para cambiarlo
            if (wasActive && gameState[activeTeam].length > 0) {
                alert('¡Tu Pokémon activo ha sido debilitado! Selecciona uno nuevo de la banca.');
            }
            
            goBackToRoster();
        }
    }
</script>
</body>
</html>
